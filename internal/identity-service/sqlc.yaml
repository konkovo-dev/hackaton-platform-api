version: "2"
sql:
  - schema:
      - "migrations/00001_init.sql"
      - "migrations/00002_skills_contacts_visibility.sql"
      - "migrations/00003_skill_catalog_with_ids.sql"
      - "migrations/00004_add_outbox.sql"
    queries: "repository/postgres/queries"
    engine: "postgresql"
    gen:
      go:
        package: "queries"
        out: "repository/postgres/queries"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_pointers_for_null_types: false
        overrides:
          - db_type: "pg_catalog.uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"

