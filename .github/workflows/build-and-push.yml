name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.auth-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-auth-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push identity-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.identity-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-identity-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-identity-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push hackaton-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.hackaton-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-hackaton-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-hackaton-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push participation-and-roles-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.participation-and-roles-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-participation-and-roles-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-participation-and-roles-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push team-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.team-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-team-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-team-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push mentors-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.mentors-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-mentors-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-mentors-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push matchmaking-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.matchmaking-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-matchmaking-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-matchmaking-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push submission-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.submission-service
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-submission-service:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-submission-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.gateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-gateway:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push migrations
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deployments/prod/Dockerfile.migrations
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-migrations:${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-migrations:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tags
        run: |
          echo "✓ Built and pushed 11 images with tag: ${{ steps.meta.outputs.sha_short }}"
          echo "Images are available at: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/hackathon-*"
