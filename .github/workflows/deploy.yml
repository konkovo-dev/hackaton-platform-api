name: Deploy to Production

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract SHA
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/hackplatform
            
            # Обновляем IMAGE_TAG в .env
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${{ steps.meta.outputs.sha_short }}/" .env
            
            # Скачиваем новые образы (публичные, логин не нужен)
            docker compose --env-file .env -f deployments/prod/docker-compose.yml pull
            
            # Перезапускаем изменённые контейнеры
            docker compose --env-file .env -f deployments/prod/docker-compose.yml up -d
            
            # Показываем статус
            docker compose --env-file .env -f deployments/prod/docker-compose.yml ps
            
            echo "✓ Deployment completed with image tag: ${{ steps.meta.outputs.sha_short }}"

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/hackplatform
            
            # Проверяем что gateway отвечает
            timeout 30 bash -c 'until curl -f http://localhost:8080/swagger/ > /dev/null 2>&1; do sleep 2; done' || {
              echo "Gateway health check failed"
              docker compose --env-file .env -f deployments/prod/docker-compose.yml logs gateway
              exit 1
            }
            
            echo "✓ Gateway is healthy"
