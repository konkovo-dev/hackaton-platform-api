services:
  postgres:
    image: postgres:16-alpine
    container_name: hackathon-postgres
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon_dev_password
      POSTGRES_DB: hackathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 5s
      timeout: 5s
      retries: 5

  identity:
    build:
      context: .
      dockerfile: Dockerfile.identity
    container_name: hackathon-identity
    environment:
      ENV: dev
      IDENTITY_GRPC_PORT: 50051
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  core:
    build:
      context: .
      dockerfile: Dockerfile.core
    container_name: hackathon-core
    environment:
      ENV: dev
      CORE_GRPC_PORT: 50052
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  teams:
    build:
      context: .
      dockerfile: Dockerfile.teams
    container_name: hackathon-teams
    environment:
      ENV: dev
      TEAMS_GRPC_PORT: 50053
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  submission:
    build:
      context: .
      dockerfile: Dockerfile.submission
    container_name: hackathon-submission
    environment:
      ENV: dev
      SUBMISSION_GRPC_PORT: 50054
    ports:
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  mentorship:
    build:
      context: .
      dockerfile: Dockerfile.mentorship
    container_name: hackathon-mentorship
    environment:
      ENV: dev
      MENTORSHIP_GRPC_PORT: 50055
    ports:
      - "50055:50055"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  jury:
    build:
      context: .
      dockerfile: Dockerfile.jury
    container_name: hackathon-jury
    environment:
      ENV: dev
      JURY_GRPC_PORT: 50056
    ports:
      - "50056:50056"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    container_name: hackathon-gateway
    environment:
      ENV: dev
      GATEWAY_HTTP_PORT: 8080
      IDENTITY_GRPC_ENDPOINT: identity:50051
    ports:
      - "8080:8080"
    depends_on:
      - identity
      - core
      - teams
      - submission
      - mentorship
      - jury
    networks:
      - hackathon-network
    restart: unless-stopped

networks:
  hackathon-network:
    driver: bridge

volumes:
  postgres_data:

