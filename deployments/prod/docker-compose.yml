services:
  postgres:
    image: postgres:16-alpine
    container_name: hackathon-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: hackathon_auth,hackathon_identity,hackathon_hackaton,hackathon_participation,hackathon_team,hackathon_mentors,hackathon_matchmaking,hackathon_submission,hackathon_judging
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sh:/docker-entrypoint-initdb.d/init-postgres.sh:ro
    ports:
      - "5432:5432"
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  migrations:
    image: ${DOCKER_REGISTRY}/hackathon-migrations:${IMAGE_TAG}
    container_name: hackathon-migrations
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: "no"

  nats:
    image: nats:2.10-alpine
    container_name: hackathon-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - hackathon-network
    command: ["--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: hackathon-centrifugo
    ports:
      - "8000:8000"
    environment:
      CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_JWT_SECRET}
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET}
      CENTRIFUGO_ALLOWED_ORIGINS: ${CENTRIFUGO_ALLOWED_ORIGINS}
    volumes:
      - ./centrifugo-config.json:/centrifugo/config.json:ro
    networks:
      - hackathon-network
    command: centrifugo --config=/centrifugo/config.json --port=8000 --health
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: hackathon-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - hackathon-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    image: ${DOCKER_REGISTRY}/hackathon-auth-service:${IMAGE_TAG}
    container_name: hackathon-auth-service
    environment:
      ENV: production
      AUTH_SERVICE_GRPC_PORT: 50057
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_auth?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      RS256_PRIVATE_KEY_PATH: /app/keys/private_key.pem
      JWT_KEY_ID: ${JWT_KEY_ID}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL}
      IDEMPOTENCY_TTL: 24h
      IDENTITY_SERVICE_URL: identity-service:50051
      OUTBOX_POLLING_INTERVAL: 1s
      OUTBOX_MAX_ATTEMPTS: 3
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    volumes:
      - ${JWT_KEYS_PATH}:/app/keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - hackathon-network
    restart: unless-stopped

  identity-service:
    image: ${DOCKER_REGISTRY}/hackathon-identity-service:${IMAGE_TAG}
    container_name: hackathon-identity-service
    environment:
      ENV: production
      IDENTITY_SERVICE_GRPC_PORT: 50051
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_identity?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      NATS_URL: nats://nats:4222
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
      S3_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      S3_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-api.hackplatform.ru:9000}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_AVATARS_BUCKET: avatars
      S3_USE_SSL: ${MINIO_USE_SSL:-false}
      S3_PUBLIC_READ: "true"
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - hackathon-network
    restart: unless-stopped

  hackaton-service:
    image: ${DOCKER_REGISTRY}/hackathon-hackaton-service:${IMAGE_TAG}
    container_name: hackathon-hackaton-service
    environment:
      ENV: production
      HACKATON_SERVICE_GRPC_PORT: 50052
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_hackaton?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - hackathon-network
    restart: unless-stopped

  participation-and-roles-service:
    image: ${DOCKER_REGISTRY}/hackathon-participation-and-roles-service:${IMAGE_TAG}
    container_name: hackathon-participation-and-roles-service
    environment:
      ENV: production
      PARTICIPATION_AND_ROLES_SERVICE_GRPC_PORT: 50055
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_participation?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      HACKATHON_CLIENT_SERVICE_URL: hackaton-service:50052
      IDENTITY_SERVICE_URL: identity-service:50051
      IDENTITY_CLIENT_SERVICE_URL: identity-service:50051
      NATS_URL: nats://nats:4222
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  team-service:
    image: ${DOCKER_REGISTRY}/hackathon-team-service:${IMAGE_TAG}
    container_name: hackathon-team-service
    environment:
      ENV: production
      TEAM_SERVICE_GRPC_PORT: 50053
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_team?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      NATS_URL: nats://nats:4222
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  mentors-service:
    image: ${DOCKER_REGISTRY}/hackathon-mentors-service:${IMAGE_TAG}
    container_name: hackathon-mentors-service
    environment:
      ENV: production
      MENTORS_SERVICE_GRPC_PORT: 50056
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_mentors?sslmode=disable&search_path=mentors
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      NATS_URL: nats://nats:4222
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_API_KEY: ${CENTRIFUGO_API_KEY}
      CENTRIFUGO_JWT_SECRET: ${CENTRIFUGO_JWT_SECRET}
      CENTRIFUGO_JWT_TTL: ${CENTRIFUGO_JWT_TTL:-24h}
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      TEAM_SERVICE_URL: team-service:50053
      IDEMPOTENCY_TTL: 24h
      OUTBOX_POLL_INTERVAL: ${OUTBOX_POLL_INTERVAL:-1s}
      OUTBOX_MAX_ATTEMPTS: ${OUTBOX_MAX_ATTEMPTS:-3}
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  matchmaking-service:
    image: ${DOCKER_REGISTRY}/hackathon-matchmaking-service:${IMAGE_TAG}
    container_name: hackathon-matchmaking-service
    environment:
      ENV: production
      MATCHMAKING_SERVICE_GRPC_PORT: 50059
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_matchmaking?sslmode=disable&search_path=matchmaking
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      NATS_URL: nats://nats:4222
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      TEAM_SERVICE_URL: team-service:50053
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  judging-service:
    image: ${DOCKER_REGISTRY}/hackathon-judging-service:${IMAGE_TAG}
    container_name: hackathon-judging-service
    environment:
      ENV: production
      JUDGING_SERVICE_GRPC_PORT: 50060
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_judging?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      SUBMISSION_SERVICE_URL: submission-service:50058
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - hackathon-network
    restart: unless-stopped

  submission-service:
    image: ${DOCKER_REGISTRY}/hackathon-submission-service:${IMAGE_TAG}
    container_name: hackathon-submission-service
    environment:
      ENV: production
      SUBMISSION_SERVICE_GRPC_PORT: 50058
      DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hackathon_submission?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      S3_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      S3_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-api.hackplatform.ru:9000}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_SUBMISSIONS_BUCKET: submissions
      S3_USE_SSL: ${MINIO_USE_SSL:-false}
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      TEAM_SERVICE_URL: team-service:50053
      IDEMPOTENCY_TTL: 24h
      SUBMISSION_MAX_FILE_SIZE_BYTES: ${SUBMISSION_MAX_FILE_SIZE_BYTES:-52428800}
      SUBMISSION_MAX_TOTAL_SIZE_BYTES: ${SUBMISSION_MAX_TOTAL_SIZE_BYTES:-209715200}
      SUBMISSION_MAX_FILES_PER_SUBMISSION: ${SUBMISSION_MAX_FILES_PER_SUBMISSION:-20}
      SUBMISSION_MAX_SUBMISSIONS_PER_OWNER: ${SUBMISSION_MAX_SUBMISSIONS_PER_OWNER:-50}
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  gateway:
    image: ${DOCKER_REGISTRY}/hackathon-gateway:${IMAGE_TAG}
    container_name: hackathon-gateway
    environment:
      ENV: production
      GATEWAY_HTTP_PORT: 8080
      IDENTITY_GRPC_ENDPOINT: identity-service:50051
      AUTH_GRPC_ENDPOINT: auth-service:50057
      HACKATON_GRPC_ENDPOINT: hackaton-service:50052
      PARTICIPATION_ROLES_GRPC_ENDPOINT: participation-and-roles-service:50055
      TEAM_GRPC_ENDPOINT: team-service:50053
      MENTORS_GRPC_ENDPOINT: mentors-service:50056
      MATCHMAKING_GRPC_ENDPOINT: matchmaking-service:50059
      SUBMISSION_GRPC_ENDPOINT: submission-service:50058
      JUDGING_GRPC_ENDPOINT: judging-service:50060
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
      - hackaton-service
      - participation-and-roles-service
      - auth-service
      - team-service
      - mentors-service
      - matchmaking-service
      - submission-service
      - judging-service
    networks:
      - hackathon-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/swagger/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  hackathon-network:
    driver: bridge

volumes:
  postgres_data: {}
  minio_data: {}
