services:
  postgres:
    image: postgres:16-alpine
    container_name: hackathon-postgres
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: hackathon_dev_password
      POSTGRES_DB: hackathon
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hackathon-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: hackathon-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - hackathon-network
    command: ["--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  centrifugo:
    image: centrifugo/centrifugo:v5
    container_name: hackathon-centrifugo
    ports:
      - "8000:8000"
    volumes:
      - ./centrifugo-config.json:/centrifugo/config.json:ro
    networks:
      - hackathon-network
    command: centrifugo --config=/centrifugo/config.json --port=8000 --health --client_insecure
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.auth-service
    container_name: hackathon-auth-service
    environment:
      ENV: dev
      AUTH_SERVICE_GRPC_PORT: 50057
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      RS256_PRIVATE_KEY_PATH: /app/keys/private_key.pem
      JWT_KEY_ID: key-1
      JWT_ISSUER: hackaton-platform
      JWT_AUDIENCE: hackaton-platform
      ACCESS_TOKEN_TTL: 1h
      REFRESH_TOKEN_TTL: 720h
      IDEMPOTENCY_TTL: 24h
      IDENTITY_SERVICE_URL: identity-service:50051
      OUTBOX_POLL_INTERVAL: 1s
      OUTBOX_MAX_ATTEMPTS: 3
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50057:50057"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  identity-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.identity-service
    container_name: hackathon-identity-service
    environment:
      ENV: dev
      IDENTITY_SERVICE_GRPC_PORT: 50051
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      NATS_URL: nats://nats:4222
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
      S3_ENDPOINT: minio:9000
      S3_PUBLIC_ENDPOINT: localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_AVATARS_BUCKET: avatars
      S3_USE_SSL: "false"
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - hackathon-network
    restart: unless-stopped

  hackaton-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.hackaton-service
    container_name: hackathon-hackaton-service
    environment:
      ENV: dev
      HACKATON_SERVICE_GRPC_PORT: 50052
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable&search_path=hackathon
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  team-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.team-service
    container_name: hackathon-team-service
    environment:
      ENV: dev
      TEAM_SERVICE_GRPC_PORT: 50053
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      NATS_URL: nats://nats:4222
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: hackathon-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - hackathon-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  submission-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.submission-service
    container_name: hackathon-submission-service
    environment:
      ENV: dev
      SUBMISSION_SERVICE_GRPC_PORT: 50058
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable&search_path=submission
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      S3_ENDPOINT: minio:9000
      S3_PUBLIC_ENDPOINT: localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_SUBMISSIONS_BUCKET: submissions
      S3_USE_SSL: "false"
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      TEAM_SERVICE_URL: team-service:50053
      IDEMPOTENCY_TTL: 24h
      SUBMISSION_MAX_FILE_SIZE_BYTES: 52428800
      SUBMISSION_MAX_TOTAL_SIZE_BYTES: 209715200
      SUBMISSION_MAX_FILES_PER_SUBMISSION: 20
      SUBMISSION_MAX_SUBMISSIONS_PER_OWNER: 50
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50058:50058"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  participation-and-roles-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.participation-and-roles-service
    container_name: hackathon-participation-and-roles-service
    environment:
      ENV: dev
      PARTICIPATION_AND_ROLES_SERVICE_GRPC_PORT: 50055
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      HACKATHON_CLIENT_SERVICE_URL: hackaton-service:50052
      IDENTITY_SERVICE_URL: identity-service:50051
      IDENTITY_CLIENT_SERVICE_URL: identity-service:50051
      NATS_URL: nats://nats:4222
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50055:50055"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  mentors-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.mentors-service
    container_name: hackathon-mentors-service
    environment:
      ENV: dev
      MENTORS_SERVICE_GRPC_PORT: 50056
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable&search_path=mentors
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      NATS_URL: nats://nats:4222
      CENTRIFUGO_URL: http://centrifugo:8000
      CENTRIFUGO_API_KEY: dev-api-key-change-in-production
      CENTRIFUGO_JWT_SECRET: dev-jwt-secret-change-in-production
      CENTRIFUGO_JWT_TTL: 24h
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      TEAM_SERVICE_URL: team-service:50053
      IDEMPOTENCY_TTL: 24h
      OUTBOX_POLL_INTERVAL: 1s
      OUTBOX_MAX_ATTEMPTS: 3
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50056:50056"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      centrifugo:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  matchmaking-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.matchmaking-service
    container_name: hackathon-matchmaking-service
    environment:
      ENV: dev
      MATCHMAKING_SERVICE_GRPC_PORT: 50059
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable&search_path=matchmaking
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      NATS_URL: nats://nats:4222
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      TEAM_SERVICE_URL: team-service:50053
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50059:50059"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  judging-service:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.judging-service
    container_name: hackathon-judging-service
    environment:
      ENV: dev
      JUDGING_SERVICE_GRPC_PORT: 50060
      DB_DSN: postgres://hackathon:hackathon_dev_password@postgres:5432/hackathon?sslmode=disable&search_path=judging
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      DB_MAX_CONN_LIFETIME: 1h
      DB_MAX_CONN_IDLE_TIME: 30m
      DB_HEALTH_CHECK_PERIOD: 1m
      AUTH_CLIENT_SERVICE_URL: auth-service:50057
      AUTH_CLIENT_MAX_CACHE_TTL: 60s
      AUTH_CLIENT_CACHE_CLEANUP_INTERVAL: 1m
      HACKATHON_SERVICE_URL: hackaton-service:50052
      PARTICIPATION_ROLES_SERVICE_URL: participation-and-roles-service:50055
      SUBMISSION_SERVICE_URL: submission-service:50058
      IDEMPOTENCY_TTL: 24h
      SERVICE_AUTH_TOKEN: dev-service-token-change-in-production
    ports:
      - "50060:50060"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hackathon-network
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: deployments/Dockerfile.gateway
    container_name: hackathon-gateway
    environment:
      ENV: dev
      GATEWAY_HTTP_PORT: 8080
      IDENTITY_GRPC_ENDPOINT: identity-service:50051
      AUTH_GRPC_ENDPOINT: auth-service:50057
      HACKATON_GRPC_ENDPOINT: hackaton-service:50052
      TEAM_GRPC_ENDPOINT: team-service:50053
      SUBMISSION_GRPC_ENDPOINT: submission-service:50058
      PARTICIPATION_ROLES_GRPC_ENDPOINT: participation-and-roles-service:50055
      MENTORS_GRPC_ENDPOINT: mentors-service:50056
      MATCHMAKING_GRPC_ENDPOINT: matchmaking-service:50059
      JUDGING_GRPC_ENDPOINT: judging-service:50060
    ports:
      - "8080:8080"
    depends_on:
      - identity-service
      - hackaton-service
      - team-service
      - submission-service
      - participation-and-roles-service
      - mentors-service
      - matchmaking-service
      - judging-service
      - auth-service
    networks:
      - hackathon-network
    restart: unless-stopped

networks:
  hackathon-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:

