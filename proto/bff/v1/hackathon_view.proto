syntax = "proto3";

package bff.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/bff/hackathon/v1;bffhackathonv1";

import "hackathon/v1/hackathon.proto";
import "hackathon/v1/common.proto";
import "participationandroles/v1/common.proto";

message HackathonViewForMe {
  hackathon.v1.Hackathon hackathon = 1;

  string user_id = 2;

  participationandroles.v1.ParticipationStatus participation_status = 3;
  string team_id = 4;
  repeated participationandroles.v1.HackathonRole roles = 5;

  repeated participationandroles.v1.AccessPolicy policies = 6;

  repeated hackathon.v1.ValidationError draft_validation_errors = 7;

  repeated SidebarItem sidebar = 10;
  CallToAction cta = 11;
}

enum SidebarSection {
  SIDEBAR_SECTION_UNSPECIFIED = 0;
  SIDEBAR_SECTION_MAIN = 1;
  SIDEBAR_SECTION_TEAM = 2;
  SIDEBAR_SECTION_SUBMISSIONS = 3;
  SIDEBAR_SECTION_MENTORS = 4;
  SIDEBAR_SECTION_JUDGING = 5;
  SIDEBAR_SECTION_RESULTS = 6;
  SIDEBAR_SECTION_ANNOUNCEMENTS = 7;
  SIDEBAR_SECTION_MANAGE = 8;
}

message SidebarItem {
  SidebarSection section = 1;
  bool enabled = 2;
  string disabled_reason = 3;
}

enum CtaAction {
  CTA_ACTION_UNSPECIFIED = 0;

  CTA_AUTH_LOGIN_OR_SIGNUP = 1;

  CTA_HACKATHON_REGISTER_INDIVIDUAL = 2;
  CTA_HACKATHON_CREATE_TEAM = 3;
  CTA_HACKATHON_JOIN_TEAM = 4;

  CTA_HACKATHON_EDIT = 10;
  CTA_HACKATHON_VALIDATE = 11;
  CTA_HACKATHON_PUBLISH = 12;
  CTA_HACKATHON_MANAGE_ANNOUNCEMENTS = 13;
}

message CallToAction {
  bool enabled = 1;
  string reason = 2;
  string target_path = 3;
  CtaAction action = 4;
}
