syntax = "proto3";

package auth.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/auth/v1;authv1";

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/idempotency.proto";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }

  rpc Login(LoginRequest) returns (LoginResponse) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }

  rpc Refresh(RefreshRequest) returns (RefreshResponse) {
    option (google.api.http) = {
      post: "/v1/auth/refresh"
      body: "*"
    };
  }

  rpc Logout(LogoutRequest) returns (LogoutResponse) {
    option (google.api.http) = {
      post: "/v1/auth/logout"
      body: "*"
    };
  }

  rpc IntrospectToken(IntrospectTokenRequest) returns (IntrospectTokenResponse) {
  option (google.api.http) = {
      post: "/v1/auth/introspect"
      body: "*"
    };
  }
}

message RegisterRequest {
  oneof login {
    string email = 1;
  }

  string password = 10;

  string first_name = 20;
  string last_name = 21;
  string username = 22;

  string timezone = 23;

  common.v1.IdempotencyKey idempotency_key = 30;
}

message LoginRequest {
  oneof login {
    string email = 1;
    string username = 2;
  }

  string password = 10;
}

message RefreshRequest {
  string refresh_token = 1;
}

message LogoutRequest {
  string refresh_token = 1;
}

message RegisterResponse {
  string access_token = 1;

  string refresh_token = 2;

  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

message LoginResponse {
  string access_token = 1;

  string refresh_token = 2;

  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

message RefreshResponse {
  string access_token = 1;

  string refresh_token = 2;

  google.protobuf.Timestamp access_expires_at = 3;
  google.protobuf.Timestamp refresh_expires_at = 4;
}

message LogoutResponse { }

message IntrospectTokenRequest {
  string access_token = 1;
}

message IntrospectTokenResponse {
  bool active = 1;
  string user_id = 2;
  google.protobuf.Timestamp expires_at = 3;
}
