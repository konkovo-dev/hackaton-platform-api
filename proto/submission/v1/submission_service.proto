syntax = "proto3";

package submission.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/submission/v1;submissionv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "common/v1/idempotency.proto";
import "common/v1/query.proto";
import "submission/v1/submission.proto";
import "submission/v1/common.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service SubmissionService {
  // Create a new submission
  rpc CreateSubmission(CreateSubmissionRequest) returns (CreateSubmissionResponse) {
    option (google.api.http) = {
      post: "/v1/hackathons/{hackathon_id}/submissions"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create a submission"
      description: "Creates a new submission for the hackathon. Automatically marks it as final if no other final submission exists. Available only during RUNNING stage."
      tags: "Submissions"
    };
  }

  // Update submission description
  rpc UpdateSubmission(UpdateSubmissionRequest) returns (UpdateSubmissionResponse) {
    option (google.api.http) = {
      put: "/v1/hackathons/{hackathon_id}/submissions/{submission_id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update submission description"
      description: "Updates the description of a submission. Only the creator can update. Available only during RUNNING stage."
      tags: "Submissions"
    };
  }

  // List submissions
  rpc ListSubmissions(ListSubmissionsRequest) returns (ListSubmissionsResponse) {
    option (google.api.http) = {
      post: "/v1/hackathons/{hackathon_id}/submissions/list"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List submissions"
      description: "Returns submissions for the hackathon. If owner_kind and owner_id are specified, returns submissions for that owner. If not specified, returns submissions for the authenticated user/team. Staff (owners, organizers, mentors, judges) can list submissions for any participant/team. Available from RUNNING stage onwards."
      tags: "Submissions"
    };
  }

  // Select final submission
  rpc SelectFinalSubmission(SelectFinalSubmissionRequest) returns (SelectFinalSubmissionResponse) {
    option (google.api.http) = {
      post: "/v1/hackathons/{hackathon_id}/submissions/{submission_id}/select-final"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Select final submission"
      description: "Marks a submission as final. Unmarks any previously selected final submission. Only team captain (for team submissions) or individual participant can perform this. Available only during RUNNING stage."
      tags: "Submissions"
    };
  }

  // Get a specific submission
  rpc GetSubmission(GetSubmissionRequest) returns (GetSubmissionResponse) {
    option (google.api.http) = {
      get: "/v1/hackathons/{hackathon_id}/submissions/{submission_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get submission"
      description: "Returns a submission by ID. Owner can view their own submissions. Staff (owners, organizers, mentors, judges) can view any submission. Available from RUNNING stage onwards."
      tags: "Submissions"
    };
  }

  // Get final submission for a participant or team
  rpc GetFinalSubmission(GetFinalSubmissionRequest) returns (GetFinalSubmissionResponse) {
    option (google.api.http) = {
      get: "/v1/hackathons/{hackathon_id}/participants/{owner_kind}/{owner_id}/final-submission"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get final submission"
      description: "Returns the final submission for a participant or team. Owner can view their own final submission. Staff (owners, organizers, mentors, judges) can view any final submission. Available from RUNNING stage onwards."
      tags: "Submissions"
    };
  }
}

// === Request/Response messages ===

message CreateSubmissionRequest {
  string hackathon_id = 1;
  
  string title = 2;
  string description = 3;
  
  common.v1.IdempotencyKey idempotency_key = 10;
}

message CreateSubmissionResponse {
  string submission_id = 1;
  bool is_final = 2; // true if automatically marked as final
}

message UpdateSubmissionRequest {
  string hackathon_id = 1;
  string submission_id = 2;
  
  string description = 3;
  
  common.v1.IdempotencyKey idempotency_key = 10;
}

message UpdateSubmissionResponse {
  Submission submission = 1;
}

message ListSubmissionsRequest {
  string hackathon_id = 1;
  
  // Optional: filter by owner. If not specified, returns submissions for the authenticated user/team.
  // Staff can specify any owner to view their submissions.
  string owner_kind = 2; // "user" or "team"
  string owner_id = 3;
  
  common.v1.Query query = 10;
}

message ListSubmissionsResponse {
  repeated Submission submissions = 1;
  common.v1.PageResponse page = 2;
}

message SelectFinalSubmissionRequest {
  string hackathon_id = 1;
  string submission_id = 2;
  
  common.v1.IdempotencyKey idempotency_key = 10;
}

message SelectFinalSubmissionResponse {
  string submission_id = 1;
  google.protobuf.Timestamp selected_at = 2;
}

message GetSubmissionRequest {
  string hackathon_id = 1;
  string submission_id = 2;
}

message GetSubmissionResponse {
  Submission submission = 1;
}

message GetFinalSubmissionRequest {
  string hackathon_id = 1;
  string owner_kind = 2; // "user" or "team"
  string owner_id = 3;
}

message GetFinalSubmissionResponse {
  Submission submission = 1;
}
