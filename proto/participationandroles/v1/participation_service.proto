syntax = "proto3";

package participationandroles.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/participationandroles/v1;participationandrolesv1";

import "google/api/annotations.proto";

import "common/v1/idempotency.proto";
import "common/v1/query.proto";

import "participationandroles/v1/common.proto";
import "participationandroles/v1/participation.proto";

service ParticipationService {
  rpc RegisterForHackathon(RegisterForHackathonRequest) returns (RegisterForHackathonResponse) {
    option (google.api.http) = {
      post: "/v1/hackathons/{hackathon_id}/participations:register"
      body: "*"
    };
  }

  rpc GetMyParticipation(GetMyParticipationRequest) returns (GetMyParticipationResponse) {
    option (google.api.http) = { get: "/v1/hackathons/{hackathon_id}/participations/me" };
  }

  rpc UpdateMyParticipation(UpdateMyParticipationRequest) returns (UpdateMyParticipationResponse) {
    option (google.api.http) = {
      put: "/v1/hackathons/{hackathon_id}/participations/me"
      body: "*"
    };
  }

  rpc SwitchParticipationMode(SwitchParticipationModeRequest) returns (SwitchParticipationModeResponse) {
    option (google.api.http) = {
      post: "/v1/hackathons/{hackathon_id}/participations/me:switchMode"
      body: "*"
    };
  }

  rpc UnregisterFromHackathon(UnregisterFromHackathonRequest) returns (UnregisterFromHackathonResponse) {
    option (google.api.http) = {
      post: "/v1/hackathons/{hackathon_id}/participations/me:unregister"
      body: "*"
    };
  }

  rpc GetUserParticipation(GetUserParticipationRequest) returns (GetUserParticipationResponse) {
    option (google.api.http) = { get: "/v1/hackathons/{hackathon_id}/participations/users/{user_id}" };
  }

  rpc ListHackathonParticipants(ListHackathonParticipantsRequest) returns (ListHackathonParticipantsResponse) {
    option (google.api.http) = {
      post: "/v1/hackathons/{hackathon_id}/participations:list"
      body: "*"
    };
  }

  rpc ConvertToTeamParticipation(ConvertToTeamParticipationRequest) returns (ConvertToTeamParticipationResponse);

  rpc ConvertFromTeamParticipation(ConvertFromTeamParticipationRequest) returns (ConvertFromTeamParticipationResponse);

  rpc ListTeamRoles(ListTeamRolesRequest) returns (ListTeamRolesResponse) {
    option (google.api.http) = { get: "/v1/team-roles" };
  };
}

message ListTeamRolesRequest {}

message ListTeamRolesResponse {
  repeated TeamRole team_roles = 1;
}

message RegisterForHackathonRequest {
  string hackathon_id = 1;

  ParticipationStatus desired_status = 2;

  repeated string wished_role_ids = 3;

  string motivation_text = 4;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message RegisterForHackathonResponse {
  HackathonParticipation participation = 1;
}

message GetMyParticipationRequest {
  string hackathon_id = 1;
}

message GetMyParticipationResponse {
  HackathonParticipation participation = 1;
}

message UpdateMyParticipationRequest {
  string hackathon_id = 1;

  repeated string wished_role_ids = 2;

  string motivation_text = 3;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message UpdateMyParticipationResponse {
  HackathonParticipation participation = 1;
}

message SwitchParticipationModeRequest {
  string hackathon_id = 1;

  ParticipationStatus new_status = 2;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message SwitchParticipationModeResponse {
  HackathonParticipation participation = 1;
}

message UnregisterFromHackathonRequest {
  string hackathon_id = 1;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message UnregisterFromHackathonResponse {}

message GetUserParticipationRequest {
  string hackathon_id = 1;
  string user_id = 2;
}

message GetUserParticipationResponse {
  HackathonParticipation participation = 1;
}

message ParticipationStatusFilter {
  repeated ParticipationStatus statuses = 1;
}

message ListHackathonParticipantsRequest {
  string hackathon_id = 1;

  ParticipationStatusFilter status_filter = 2;
  repeated string wished_role_ids_filter = 3;

  common.v1.Query query = 10;
}

message ListHackathonParticipantsResponse {
  repeated HackathonParticipation participants = 1;
  common.v1.PageResponse page = 2;
}

message ConvertToTeamParticipationRequest {
  string hackathon_id = 1;
  string user_id = 2;
  string team_id = 3;
  bool is_captain = 4;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message ConvertToTeamParticipationResponse {
  HackathonParticipation participation = 1;
}

message ConvertFromTeamParticipationRequest {
  string hackathon_id = 1;
  string user_id = 2;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message ConvertFromTeamParticipationResponse {
  HackathonParticipation participation = 1;
}
