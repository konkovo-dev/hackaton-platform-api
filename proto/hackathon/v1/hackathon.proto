syntax = "proto3";

package hackathon.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/hackathon/v1;hackathonv1";

import "google/protobuf/timestamp.proto";
import "hackathon/v1/common.proto";

message Hackathon {
  string hackathon_id = 1;
  string name = 2;
  string short_description = 3;
  string description = 4;
  HackathonLocation location = 5;
  HackathonDates dates = 6;
  HackathonStage stage = 7;
  HackathonLimits limits = 8;
  repeated HackathonLink links = 9;
  HackathonRegistrationPolicy registration_policy = 10;
  HackathonState state = 11;

  google.protobuf.Timestamp published_at = 12;

  google.protobuf.Timestamp created_at = 20;
  google.protobuf.Timestamp updated_at = 21;
}

message HackathonRegistrationPolicy {
  bool allow_individual = 1;
  bool allow_team = 2;
}

message HackathonLocation {
  bool online = 1;
  string city = 2;
  string country = 3;
  string venue = 4;
}

message HackathonDates {
  google.protobuf.Timestamp starts_at = 1;
  google.protobuf.Timestamp ends_at = 2;

  google.protobuf.Timestamp registration_opens_at = 3;
  google.protobuf.Timestamp registration_closes_at = 4;

  google.protobuf.Timestamp submissions_opens_at = 5;
  google.protobuf.Timestamp submissions_closes_at = 6;

  google.protobuf.Timestamp judging_ends_at = 7;
}

message HackathonLimits {
  uint32 team_size_max = 1;
}

message HackathonLink {
  string title = 1;
  string url = 2;
}
