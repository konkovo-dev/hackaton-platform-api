syntax = "proto3";

package identity.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/identity/v1;identityv1";

message CatalogSkill {
  string id = 1;
  string name = 2;
}

message CustomSkill {
  string name = 1;
}

message Skill {
  oneof kind {
    CatalogSkill catalog = 1;
    CustomSkill custom = 2;
  }
}
