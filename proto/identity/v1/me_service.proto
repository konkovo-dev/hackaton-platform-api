syntax = "proto3";

package identity.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/identity/v1;identityv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "identity/v1/common.proto";
import "identity/v1/user.proto";
import "identity/v1/skill.proto";
import "identity/v1/contact.proto";
import "identity/v1/visibility.proto";
import "common/v1/idempotency.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service MeService {
  rpc GetMe(GetMeRequest) returns (GetMeResponse) {
    option (google.api.http) = { get: "/v1/users/me" };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get my profile"
      description: "Returns the authenticated user's full profile including skills, contacts, and visibility settings."
      tags: "Users"
    };
  }

  rpc CreateMe(CreateMeRequest) returns (CreateMeResponse) {}

  rpc UpdateMe(UpdateMeRequest) returns (UpdateMeResponse) {
    option (google.api.http) = {
      put: "/v1/users/me"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update my profile"
      description: "Updates basic profile fields (first name, last name, avatar URL, timezone) for the authenticated user."
      tags: "Users"
    };
  }

  rpc UpdateMySkills(UpdateMySkillsRequest) returns (UpdateMySkillsResponse) {
    option (google.api.http) = {
      put: "/v1/users/me/skills"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Replace my skills"
      description: "Replaces the authenticated user's skill set entirely (replace-all semantics). Also updates skills visibility."
      tags: "Users"
    };
  }

  rpc UpdateMyContacts(UpdateMyContactsRequest) returns (UpdateMyContactsResponse) {
    option (google.api.http) = {
      put: "/v1/users/me/contacts"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Replace my contacts"
      description: "Replaces the authenticated user's contact list entirely (replace-all semantics). Also updates contacts visibility."
      tags: "Users"
    };
  }

  rpc CreateAvatarUpload(CreateAvatarUploadRequest) returns (CreateAvatarUploadResponse) {
    option (google.api.http) = {
      post: "/v1/users/me/avatar/upload"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create avatar upload"
      description: "Initiates an avatar upload and returns a pre-signed PUT URL. Validates file type (images only) and size limits."
      tags: "Users"
    };
  }

  rpc CompleteAvatarUpload(CompleteAvatarUploadRequest) returns (CompleteAvatarUploadResponse) {
    option (google.api.http) = {
      post: "/v1/users/me/avatar/complete"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Complete avatar upload"
      description: "Marks the avatar upload as completed and updates the user's avatar_url after successful upload to S3."
      tags: "Users"
    };
  }
}

message GetMeRequest {}

message GetMeResponse {
  User user = 1;

  repeated Skill skills = 2;

  repeated MyContact contacts = 3;

  VisibilitySettings visibility = 4;
}

message CreateMeRequest {
  string user_id = 1;
  string first_name = 2;
  string last_name = 3;
  string username = 4;
  string timezone = 5;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message CreateMeResponse {
  User user = 1;
}

message UpdateMeRequest {
  string first_name = 1;
  string last_name = 2;

  string avatar_url = 3;
  string timezone = 4;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message UpdateMeResponse {
  User user = 1;
}

message UpdateMySkillsRequest {
  // Replace-all semantics:
  repeated string catalog_skill_ids = 1;
  repeated string user_skills = 2;

  VisibilityLevel skills_visibility = 3;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message UpdateMySkillsResponse {
  repeated Skill skills = 1;
  VisibilitySettings visibility = 2; 
}

message UpdateMyContactsRequest {
  repeated MyContact contacts = 1;

  VisibilityLevel contacts_visibility = 2;

  common.v1.IdempotencyKey idempotency_key = 10;
}

message UpdateMyContactsResponse {
  repeated MyContact contacts = 1;
  VisibilitySettings visibility = 2;
}

message CreateAvatarUploadRequest {
  string filename = 1;
  int64 size_bytes = 2;
  string content_type = 3;
  
  common.v1.IdempotencyKey idempotency_key = 10;
}

message CreateAvatarUploadResponse {
  string upload_id = 1;
  string upload_url = 2; // Pre-signed PUT URL
  google.protobuf.Timestamp expires_at = 3;
}

message CompleteAvatarUploadRequest {
  string upload_id = 1;
  
  common.v1.IdempotencyKey idempotency_key = 10;
}

message CompleteAvatarUploadResponse {
  string avatar_url = 1;
}
