syntax = "proto3";

package identity.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/identity/v1;identityv1";

message User {
  string user_id = 1;

  string first_name = 2;
  string last_name = 3;

  string username = 4;

  string avatar_url = 6;
  string timezone = 7;
}
