syntax = "proto3";

package identity.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/identity/v1;identityv1";

import "google/api/annotations.proto";
import "common/v1/query.proto";
import "identity/v1/skill.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service SkillsService {
  rpc ListSkillCatalog(ListSkillCatalogRequest) returns (ListSkillCatalogResponse) {
    option (google.api.http) = {
      post: "/v1/skills/list"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List skill catalog"
      description: "Returns a paginated list of skills from the global catalog. Use when displaying a skill picker."
      tags: "Skills"
    };
  } 
}

message ListSkillCatalogRequest {
  common.v1.Query query = 1;
}

message ListSkillCatalogResponse {
  repeated CatalogSkill skills = 1;
  common.v1.PageResponse page = 2;
}
