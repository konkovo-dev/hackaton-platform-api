syntax = "proto3";

package identity.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/identity/v1;identityv1";

enum VisibilityLevel {
  VISIBILITY_LEVEL_UNSPECIFIED = 0;
  VISIBILITY_LEVEL_PRIVATE = 1;
  VISIBILITY_LEVEL_PUBLIC = 2;
}

enum ContactType {
  CONTACT_TYPE_UNSPECIFIED = 0;
  CONTACT_TYPE_EMAIL = 1;
  CONTACT_TYPE_TELEGRAM = 2;
  CONTACT_TYPE_GITHUB = 3;
  CONTACT_TYPE_LINKEDIN = 4;
}
