syntax = "proto3";

package mentors.v1;

option go_package = "github.com/belikoooova/hackaton-platform-api/api/mentors/v1;mentorsv1";

import "google/protobuf/timestamp.proto";
import "mentors/v1/common.proto";

message Ticket {
  string ticket_id = 1;
  string hackathon_id = 2;
  OwnerKind owner_kind = 3;
  string owner_id = 4;
  TicketStatus status = 5;
  string assigned_mentor_user_id = 6;
  
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  google.protobuf.Timestamp closed_at = 12;
}

message Message {
  string message_id = 1;
  string ticket_id = 2;
  string author_user_id = 3;
  AuthorRole author_role = 4;
  string text = 5;
  
  google.protobuf.Timestamp created_at = 10;
}
