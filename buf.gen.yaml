version: v2
managed:
  enabled: false
plugins:
  - local: protoc-gen-go
    out: api
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: api
    opt:
      - paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: api
    opt:
      - paths=source_relative
  - local: protoc-gen-openapiv2
    out: internal/gateway/swagger
    opt:
      - json_names_for_fields=true
      - include_package_in_tags=true
